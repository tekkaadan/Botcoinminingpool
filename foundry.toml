[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
ffi = false

[profile.default.fuzz]
runs = 512
max_test_rejects = 65536
seed = "0x1"

[profile.ci.fuzz]
runs = 10000

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
